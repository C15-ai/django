<!DOCTYPE html>
<html>
<head>
    <title>Post List</title>
</head>
<body>

<h1>Postlar ro'yxati</h1>

<a href="{% url 'post_create' %}"> Yangi post</a>

<hr>

{% for post in posts %}
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h2>{{ post.title }}</h2>
        <p>{{ post.content }}</p>

        <a href="{% url 'post_detail' post.id %}">Batafsil</a>

        {% if user.is_authenticated %}
            | <a href="{% url 'post_delete' post.id %}">O'chirish</a>
        {% endif %}
    </div>
{% empty %}
    <p>Postlar yo‘q</p>
{% endfor %}

</body>
</html>
