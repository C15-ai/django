{% extends 'base.html' %}

{% block title %}
    edit
{% endblock %}

{% block main %}.
    <h1>product Edit</h1>
    <form method="post" action="{% url 'product_update' product.id %}">
        {% csrf_token %}
        <label for="name">Name:</label>
        <input type="text" name="name" placeholder="product nomi ..." required value="{{ product.name}}"> <br> <br>
        <label for="description">Description:</label>
        <input type="text" name="description" placeholder="product haqida ..." required value="{{ product.description }}"><br>
        <br>
        <label for="price">Price:</label>
        <input type="number" name="price" placeholder="narxi..." required value="{{ product.price }}"> <br><br>
        <button>Save</button>
        <a href="{% url 'product_list' %}">
            back</a>
    </form>



{% endblock %}
