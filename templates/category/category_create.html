{% extends 'base.html' %}

{% block title %}
    create
{% endblock %}

{% block main %}
    <h1>Category CREATE</h1>

    <form method="post" action="{% url 'category_create' %}">
        {% csrf_token %}

        <label for="name">Product name:</label>
        <input type="text" name="name" placeholder="Mahsulot nomi ..." required> <br><br>

        <label for="year">Description:</label>
        <input type="number" name="year" placeholder="Mahsulot Yili ..." required><br><br>



        <button>Save</button>

        <a href="{% url 'category_list' %}">
            back
        </a>
    </form>

{% endblock %}
